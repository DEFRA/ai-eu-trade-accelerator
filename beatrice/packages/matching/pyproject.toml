[project]
name = "beatrice-matching"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "beatrice-domain",
    "beatrice-guidance",
    "beatrice-llm",
    "pydantic>=2",
]

[project.optional-dependencies]
bert = ["bert-score>=0.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beatrice_matching"]
