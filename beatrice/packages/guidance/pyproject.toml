[project]
name = "beatrice-guidance"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2",
]

[project.optional-dependencies]
llm = ["beatrice-llm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/beatrice_guidance"]
